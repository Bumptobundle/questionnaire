  :root {
    --forest: #384905;
    --pale-pink: #ebded4;
    --sage: #86906f;
    --light-sage: #bac4a2;
    --white: #ffffff;
    --ink-soft: #5a6440;
    --font-heading: 'Fraunces', Georgia, serif;
    --font-body: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
    --radius-card: 14px;
    --radius-button: 10px;
  }

  html, body { background: var(--pale-pink) !important; }
  body {
    font-family: var(--font-body);
    color: var(--forest);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    margin: 0;
  }
  * { box-sizing: border-box; }

  h1, h2, h3 { font-family: var(--font-heading); font-weight: 600; line-height: 1.2; color: var(--forest); margin: 0; text-wrap: balance; }

  .band {
    background: var(--forest);
    color: var(--pale-pink);
    padding: 44px 24px 40px;
    text-align: center;
  }
  .band .wordmark { font-family: var(--font-heading); font-size: 30px; color: var(--pale-pink); letter-spacing: 0.01em; }
  .band .sub {
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--light-sage); margin-top: 6px;
  }
  .band .sprig { display: block; margin: 0 auto 14px; color: var(--light-sage); }
  .finish-screen .sprig { display: block; margin: 0 auto 14px; color: var(--sage); }
  .band .form-title {
    font-family: var(--font-heading); font-size: 24px; color: var(--white);
    margin-top: 26px;
  }

  .wrap { max-width: 660px; margin: 0 auto; padding: 28px 20px 80px; }

  .card {
    background: var(--white);

<script>
(function () {
  var NIKI_EMAIL = 'niki@bumptobundlenutrition.com';

  var BAKED = {"t": "I want to know exactly what kind of support you need so I can better serve you", "i": "I'm creating new resources and support options for women in the preconception, pregnancy and postpartum seasons, and I want them shaped by real experiences, not guesswork. Your honest answers will directly guide what I make next. There are no right answers, and the messy, unpolished version is the most helpful one.", "qs": ["To start, whereabouts are you right now: thinking about or trying for a baby, currently pregnant, or in the postpartum season? Paint me a quick picture of what this stage looks like for you.", "When it comes to nourishing yourself at this stage, what is taking up the most headspace at the moment? Say as much as you like.", "What is the trickiest part of eating well for you day to day? Think time, energy, nausea, appetite, cooking for a family, or simply knowing what to trust. Talk me through a typical day.", "Have you come across nutrition advice online or from people around you that felt confusing or contradictory? What did you hear, and where did it leave you?", "If you had an hour with a prenatal dietitian tomorrow, what would you want to walk away knowing?", "Has anything held you back from getting professional nutrition support so far? Be completely honest, whether it is cost, time, or not being sure it would actually help.", "What kind of support would genuinely suit your life right now? For example one-on-one consultations, a membership with recipes and regular Q and As, short practical videos, meal plans, or something else entirely.", "Imagine it is this time next year and everything around food and your health has clicked into place. What does that look like? What is different about your days?", "If we have worked together before, what changed for you, and how would you describe the experience to a friend who was thinking about reaching out?", "Is there anything else you would love me to know, or something you wish existed for women at your stage?"]};

  var SPRIG = '<svg class="sprig" width="54" height="34" viewBox="0 0 54 34" fill="none" aria-hidden="true">' +

      '</div>';

    html += '<div class="card">' +
      '<div class="eyebrow">About you \u2014 optional</div>' +

      '</div>';

    cfg.qs.forEach(function (q, idx) {

      html += '<div class="card" data-q="' + idx + '">' +
        '<div class="eyebrow">Question ' + (idx + 1) + ' of ' + cfg.qs.length + '</div>' +
        '<div class="q-text">' + esc(q) + '</div>' +
        '<div class="mic-row">' +
        '<button class="mic-btn" data-mic="' + idx + '" aria-label="Record your answer to question ' + (idx + 1) + '"' + (SR ? '' : ' disabled') + '>' + MIC_SVG + '</button>' +
        '<div class="mic-status" data-status="' + idx + '">' + (SR ? 'Tap to record your answer' : 'Voice answers need Safari, Chrome or Edge') + '</div>' +
        '<button class="btn btn-ghost" data-clear="' + idx + '"' + (ans ? '' : ' style="display:none"') + '>Start this answer again</button>' +

      stopActive();

men at your stage?"]};

      '<p class="tiny" style="margin-top:12px">Add as many as you like. Clients answer every one by voice. The optional name and email section is always included automatically.</p></div>';

    html += '<div class="card">' +
      '<div class="eyebrow">Put your changes live</div>' +
      '<p class="soft">Preview shows the form exactly as clients will see it. When you\u2019re happy, get the code, copy it, and paste it to Claude with the words \u201cupdate my questionnaire with this code\u201d. Claude updates the live form and your client link stays exactly the same.</p>' +
      '<div class="row" style="margin-top:12px">' +
      '<button class="btn btn-secondary" id="preview-btn">Preview the form</button>' +
      '<button class="btn btn-primary" id="make-link">Get questionnaire code</button>' +
      '<button class="btn btn-ghost" id="copy-link" style="display:none">Copy code</button>' +
      '</div>' +
      '<div class="linkbox" id="link-out" style="display:none"></div>' +
      '</div>';

    html += '<div class="card pink">' +
      '<div class="eyebrow">Editing an existing questionnaire</div>' +
      '<p class="soft">Paste a questionnaire code (or an old link that contains one) and it will load here for editing.</p>' +
      '<div class="row" style="margin-top:10px"><input type="text" id="import-link" placeholder="Paste a questionnaire code" style="flex:1;min-width:200px">' +
      '<button class="btn btn-secondary" id="import-btn">Load</button></div>' +
      '</div>';

    html += footer() + '</div>';
    app.innerHTML = html;

    document.getElementById('b-title').addEventListener('input', function (e) { cfg.t = e.target.value; persistB(); hideLink(); });
    document.getElementById('b-intro').addEventListener('input', function (e) { cfg.i = e.target.value; persistB(); hideLink(); });

    var qList = document.getElementById('q-list');
    function hideLink() {
      document.getElementById('link-out').style.display = 'none';
      document.getElementById('copy-link').style.display = 'none';
    }
    function drawQs() {
      qList.innerHTML = '';
      cfg.qs.forEach(function (q, i) {
        var item = el('<div class="q-item">' +
          '<div class="q-item-head"><span class="eyebrow" style="margin:0">Question ' + (i + 1) + '</span>' +
          '<span class="q-tools">' +
          '<button class="icon-btn" data-up="' + i + '" title="Move up" aria-label="Move question ' + (i + 1) + ' up">\u2191</button>' +
          '<button class="icon-btn" data-down="' + i + '" title="Move down" aria-label="Move question ' + (i + 1) + ' down">\u2193</button>' +
          '<button class="icon-btn" data-del="' + i + '" title="Remove" aria-label="Remove question ' + (i + 1) + '">\u00d7</button>' +
          '</span></div>' +
          '<textarea rows="2" data-qtext="' + i + '">' + esc(q) + '</textarea>' +
          '</div>');
        qList.appendChild(item);
      });
      Array.prototype.forEach.call(qList.querySelectorAll('[data-qtext]'), function (ta) {
        ta.addEventListener('input', function () {
          cfg.qs[parseInt(ta.getAttribute('data-qtext'), 10)] = ta.value;
          persistB(); hideLink();
        });
      });
      Array.prototype.forEach.call(qList.querySelectorAll('[data-up]'), function (b) {
        b.addEventListener('click', function () {
          var i = parseInt(b.getAttribute('data-up'), 10);
          if (i > 0) { var t = cfg.qs[i - 1]; cfg.qs[i - 1] = cfg.qs[i]; cfg.qs[i] = t; persistB(); hideLink(); drawQs(); }
        });
      });
      Array.prototype.forEach.call(qList.querySelectorAll('[data-down]'), function (b) {
        b.addEventListener('click', function () {
          var i = parseInt(b.getAttribute('data-down'), 10);
          if (i < cfg.qs.length - 1) { var t = cfg.qs[i + 1]; cfg.qs[i + 1] = cfg.qs[i]; cfg.qs[i] = t; persistB(); hideLink(); drawQs(); }
        });
      });
      Array.prototype.forEach.call(qList.querySelectorAll('[data-del]'), function (b) {
        b.addEventListener('click', function () {
          var i = parseInt(b.getAttribute('data-del'), 10);
          cfg.qs.splice(i, 1);
          if (!cfg.qs.length) cfg.qs.push('');
          persistB(); hideLink(); drawQs();
        });
      });
    }
    drawQs();

    document.getElementById('add-q').addEventListener('click', function () {
      cfg.qs.push(''); persistB(); hideLink(); drawQs();
      var tas = qList.querySelectorAll('textarea');
      tas[tas.length - 1].focus();
    });

    function cleanCfg() {
      return {
        t: (cfg.t || '').trim(),
        i: (cfg.i || '').trim(),
        qs: cfg.qs.map(function (q) { return q.trim(); }).filter(Boolean)
      };
    }

    document.getElementById('preview-btn').addEventListener('click', function () {
      var clean = cleanCfg();
      if (!clean.qs.length) { alert('Add at least one question first.'); return; }
      renderForm(encodeConfig(clean), true);
      window.scrollTo(0, 0);
    });

    document.getElementById('make-link').addEventListener('click', function () {
      var clean = cleanCfg();
      if (!clean.qs.length) { alert('Add at least one question first.'); return; }
      var code = encodeConfig(clean);
      var out = document.getElementById('link-out');
      out.textContent = code;
      out.style.display = 'block';
      var copyBtn = document.getElementById('copy-link');
      copyBtn.style.display = '';
      copyBtn.textContent = 'Copy code';
      copyBtn.onclick = function () {
        try { navigator.clipboard.writeText(code); copyBtn.textContent = 'Copied \u2713'; } catch (e) {}
      };
    });

    document.getElementById('import-btn').addEventListener('click', function () {
      var v = document.getElementById('import-link').value;
      var m = v.match(/#q=([A-Za-z0-9_-]+)/) || v.trim().match(/^([A-Za-z0-9_-]{40,})$/);
      var imported = m ? decodeConfig(m[1]) : null;
      if (!imported || !imported.qs) { alert('That doesn\u2019t contain a questionnaire. Check you\u2019ve pasted the full code.'); return; }
      cfg.t = imported.t || ''; cfg.i = imported.i || ''; cfg.qs = imported.qs;
      persistB();
      renderBuilder();
    });
  }

  /* ================= route ================= */
  function route() {
    var m = location.hash.match(/#q=([A-Za-z0-9_-]+)/);
    if (m) renderForm(m[1]);
    else if (BAKED && BAKED.qs && BAKED.qs.length) renderForm(encodeConfig(BAKED));
    else renderBuilder();
  }
  window.addEventListener('hashchange', route);
  route();
})();
</script>
